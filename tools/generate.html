<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate draw.io diagrams from natural language descriptions using AI">
  <title>AI Generate - draw.io Tools</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    .preview-container {
      position: relative;
      height: 350px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--color-bg-secondary);
    }
    .preview-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .preview-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-secondary);
      font-size: var(--font-size-xs);
    }
    .preview-loading {
      background: var(--color-bg-secondary) url('data:image/svg+xml;base64,77u/PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAyMDAgMjAwJz48Y2lyY2xlIGZpbGw9JyM4MDgwODAnIHN0cm9rZT0nIzgwODA4MCcgc3Ryb2tlLXdpZHRoPScxNScgcj0nMTUnIGN4PSczNScgY3k9JzEwMCc+PGFuaW1hdGUgYXR0cmlidXRlTmFtZT0nY3gnIGNhbGNNb2RlPSdzcGxpbmUnIGR1cj0nNC4yJyB2YWx1ZXM9JzM1OzE2NTsxNjU7MzU7MzUnIGtleVNwbGluZXM9JzAgLjEgLjUgMTswIC4xIC41IDE7MCAuMSAuNSAxOzAgLjEgLjUgMScgcmVwZWF0Q291bnQ9J2luZGVmaW5pdGUnIGJlZ2luPScwJz48L2FuaW1hdGU+PC9jaXJjbGU+PC9zdmc+') no-repeat center center;
    }
    .engine-info {
      font-size: var(--font-size-xs);
      color: var(--color-text-secondary);
      margin-top: var(--spacing-xs);
    }
    .config-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-sm);
      align-items: flex-end;
    }
    .config-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .config-field label {
      font-size: var(--font-size-xs);
      color: var(--color-text-secondary);
    }
    .config-field select,
    .config-field input {
      padding: var(--spacing-xs) var(--spacing-sm);
      font-size: var(--font-size-xs);
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="container">
        <div class="header__inner">
          <a href="../" class="header__brand">
            <img src="../assets/logo.svg" alt="draw.io" class="header__logo">
            <span class="header__title">draw.io Tools</span>
          </a>
          <nav class="header__nav">
            <a href="../" class="header__link">All Tools</a>
            <a href="https://github.com/jgraph/drawio-tools/discussions/3" class="header__link" target="_blank">Help</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="container tool-page">
        <nav class="breadcrumb">
          <a href="../" class="breadcrumb__link">Tools</a>
          <span class="breadcrumb__separator">/</span>
          <span class="breadcrumb__current">AI Generate</span>
        </nav>

        <div class="tool-header">
          <h1 class="tool-header__title">
            <svg class="tool-header__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
            AI Generate
          </h1>
          <p class="tool-header__description">
            Generate draw.io diagrams from natural language descriptions using AI (ChatGPT, Gemini) or paste Mermaid syntax directly.
          </p>
        </div>

        <div class="textarea-container mb-sm">
          <textarea
            id="prompt"
            rows="3"
            placeholder="Describe your diagram or paste Mermaid syntax..."
            spellcheck="false"
            autocomplete="off"
            data-1p-ignore
          ></textarea>
        </div>

        <div class="config-row mb-sm">
          <div class="config-field">
            <label for="engine">Engine</label>
            <select id="engine">
              <option value="claude">Claude</option>
              <option value="chatgpt">ChatGPT</option>
              <option value="gemini">Gemini</option>
              <option value="mermaidjs">Mermaid</option>
              <option value="drawio">draw.io XML</option>
            </select>
          </div>

          <div class="config-field" id="modelSection">
            <label for="model">Model</label>
            <select id="model"></select>
          </div>

          <div class="config-field" id="keySection">
            <label for="apikey">API Key</label>
            <input type="password" id="apikey" placeholder="API key">
          </div>

          <div class="config-field" id="promptSection">
            <label for="aiPromptSelect">Output</label>
            <select id="aiPromptSelect">
              <option id="autoOption"
                value='Generate a diagram for "%prompt%" in either MermaidJS or draw.io XML format. Choose MermaidJS unless the diagram cannot be represented in it, then use draw.io XML without indentation or newlines. Return only the valid diagram code without any other text, checklists, instructions or explanations.'
                selected>Auto</option>
              <option id="mermaidOption"
                value='Write a MermaidJS declaration for "%prompt%" and return only the valid MermaidJS syntax without any other text do not return a gantt chart unless specifically requested'
                >Mermaid</option>
              <option id="drawioOption"
                value='Write a draw.io file for "%prompt%" and return only the valid XML syntax without any other text'>
                draw.io XML</option>
            </select>
          </div>

          <button type="button" class="btn btn--primary" id="generateBtn">Generate</button>
          <button type="button" class="btn btn--secondary" id="unescapeBtn">Unescape</button>
        </div>

        <div class="preview-container mb-sm" id="previewContainer">
          <div class="preview-placeholder" id="placeholder">
            Generated diagram will appear here
          </div>
          <iframe id="preview" allowtransparency="true" style="display: none;"></iframe>
        </div>
        <div class="engine-info" id="info"></div>

        <div class="btn-row">
          <button type="button" class="btn btn--primary" id="viewBtn" disabled>View Full Screen</button>
          <button type="button" class="btn btn--secondary" id="editBtn" disabled>Edit in draw.io</button>
        </div>

        <div id="alertContainer"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer__inner">
          <span>&copy; 2026 JGraph Ltd. Apache-2.0 License.</span>
          <div class="footer__links">
            <a href="https://www.drawio.com">draw.io</a>
            <a href="https://github.com/jgraph/drawio-tools">GitHub</a>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <script src="../utils/drawio-tools.js"></script>
  <script>
    (function()
    {
      var DT = window.DrawioTools;

      var promptEl = document.getElementById('prompt');
      var engineEl = document.getElementById('engine');
      var modelEl = document.getElementById('model');
      var apikeyEl = document.getElementById('apikey');
      var aiPromptSelectEl = document.getElementById('aiPromptSelect');
      var generateBtn = document.getElementById('generateBtn');
      var viewBtn = document.getElementById('viewBtn');
      var editBtn = document.getElementById('editBtn');
      var previewEl = document.getElementById('preview');
      var placeholderEl = document.getElementById('placeholder');
      var previewContainer = document.getElementById('previewContainer');
      var infoEl = document.getElementById('info');

      var modelSection = document.getElementById('modelSection');
      var keySection = document.getElementById('keySection');
      var promptSection = document.getElementById('promptSection');

      var urlParams = new URLSearchParams(window.location.hash.substring(1));
      var keys = null;

      if (urlParams.get('keys'))
      {
        keys = JSON.parse(urlParams.get('keys'));
      }

      // ---- AI config system ported from ChatWindow (drawio-dev Dialogs.js / Editor.js) ----

      // Ported from Editor.replacePlaceholders - resolves {name} placeholders in strings
      function replacePlaceholders(str, resolver)
      {
        var result = [];

        if (str != null && resolver != null)
        {
          var regex = new RegExp('\{([^\{\}"\'=;]+)\}', 'g');
          var match = null;
          var last = 0;

          while (match = regex.exec(str))
          {
            var val = match[0];

            if (val.length > 2)
            {
              var value = resolver(val.substring(1, val.length - 1));
              var tmp = val;

              if (value != null)
              {
                tmp = value;
              }

              result.push(str.substring(last, match.index) + tmp);
              last = match.index + val.length;
            }
          }

          result.push(str.substring(last));
        }

        return result.join('');
      }

      // Ported from Editor.executeSimpleJsonPath - extracts values from JSON using a path
      function executeSimpleJsonPath(jsonObject, pathExpression)
      {
        var steps = pathExpression.replace(/^\$\.?/, '').split('.');
        var current = jsonObject;

        for (var i = 0; i < steps.length; i++)
        {
          var step = steps[i];

          if (!current)
          {
            return [];
          }

          var arrayMatch = step.match(/([^\[]+)\[(\d+)\]/);

          if (arrayMatch)
          {
            var key = arrayMatch[1];
            var index = parseInt(arrayMatch[2]);
            current = current[key];

            if (Array.isArray(current) && index < current.length)
            {
              current = current[index];
            }
            else
            {
              return [];
            }
          }
          else
          {
            current = current[step];
          }
        }

        return current !== undefined ? [current] : [];
      }

      // Clones all properties and replaces placeholders in string properties recursively
      // Ported from ChatWindow's populateTemplate
      function populateTemplate(obj, resolver, result)
      {
        if (result == null)
        {
          result = new obj.constructor();
        }

        for (var key in obj)
        {
          var value = obj[key];

          if (typeof value === 'object')
          {
            result[key] = populateTemplate(value, resolver);
          }
          else if (typeof value === 'string')
          {
            result[key] = replacePlaceholders(value, resolver);
          }
          else
          {
            result[key] = value;
          }
        }

        return result;
      }

      // AI system prompts from Editor.aiGlobals
      var aiGlobals = {
        'create': 'You are a helpful assistant that generates diagrams in either MermaidJS or draw.io XML ' +
          'format based on the given prompt. Begin with a concise checklist (3-7 bullets) of what you will ' +
          'do; keep items conceptual, not implementation-level. Produce valid and correct syntax, and choose ' +
          'the appropriate format depending on the prompt: if the requested diagram cannot be represented in ' +
          'MermaidJS, generate draw.io XML instead but do not use indentation and newlines. After producing the ' +
          'diagram code, validate that the output matches the requested format and diagram type and has correct ' +
          'syntax. Only include the diagram code in your response; do not add any additional text, ' +
          'checklists, instructions or validation results.'
      };

      // AI provider configurations from Editor.aiConfigs
      var aiConfigs = {
        gpt: {
          apiKey: 'gptApiKey',
          endpoint: 'https://api.openai.com/v1/chat/completions',
          requestHeaders: {
            'Authorization': 'Bearer {apiKey}'
          },
          request: {
            model: '{model}',
            messages: [
              {role: 'system', content: '{action}'},
              {role: 'user', content: '{prompt}'}
            ]
          },
          responsePath: '$.choices[0].message.content'
        },
        gemini: {
          apiKey: 'geminiApiKey',
          endpoint: 'https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent',
          requestHeaders: {
            'X-Goog-Api-Key': '{apiKey}'
          },
          request: {
            system_instruction: {
              parts: [{text: '{action}'}]
            },
            contents: [{
              parts: [{text: '{prompt}'}]
            }]
          },
          responsePath: '$.candidates[0].content.parts[0].text'
        },
        claude: {
          apiKey: 'claudeApiKey',
          endpoint: 'https://api.anthropic.com/v1/messages',
          requestHeaders: {
            'X-API-Key': '{apiKey}',
            'Anthropic-Version': '2023-06-01',
            'Anthropic-Dangerous-Direct-Browser-Access': 'true'
          },
          request: {
            max_tokens: 8192,
            model: '{model}',
            messages: [
              {role: 'assistant', content: '{action}'},
              {role: 'user', content: '{prompt}'}
            ]
          },
          responsePath: '$.content[0].text'
        }
      };

      // AI models from Editor.aiModels
      var aiModels = [
        {name: 'Claude 4.6 Opus', model: 'claude-opus-4-6', config: 'claude'},
        {name: 'Claude 4.6 Sonnet', model: 'claude-sonnet-4-6', config: 'claude'},
        {name: 'Gemini 3 Pro Preview', model: 'gemini-3-pro-preview', config: 'gemini'},
        {name: 'Gemini 2.5 Pro', model: 'gemini-2.5-pro', config: 'gemini'},
        {name: 'GPT-5.1', model: 'gpt-5.1-2025-11-13', config: 'gpt'},
        {name: 'GPT-4.1', model: 'gpt-4.1-2025-04-14', config: 'gpt'},
      ];

      // Maps engine select values to config keys
      var engineToConfig = {
        'claude': 'claude',
        'chatgpt': 'gpt',
        'gemini': 'gemini'
      };

      // Populate model dropdown from aiModels
      function populateModels()
      {
        modelEl.innerHTML = '';

        for (var i = 0; i < aiModels.length; i++)
        {
          var opt = document.createElement('option');
          opt.value = aiModels[i].model;
          opt.textContent = aiModels[i].name;
          opt.dataset.config = aiModels[i].config;
          modelEl.appendChild(opt);
        }
      }

      populateModels();

      // ---- End AI config system ----

      function showAlert(message, type)
      {
        DT.showToast(message, type);
      }

      function engineChanged()
      {
        var engine = engineEl.value;
        var configKey = engineToConfig[engine];

        var isAI = engine !== 'mermaidjs' && engine !== 'drawio';
        modelSection.style.display = isAI ? '' : 'none';
        keySection.style.display = isAI ? '' : 'none';
        promptSection.style.display = isAI ? '' : 'none';

        // Show/hide model options based on engine's config key
        var options = modelEl.options;
        var firstVisible = null;

        for (var i = 0; i < options.length; i++)
        {
          var visible = options[i].dataset.config === configKey;
          options[i].style.display = visible ? '' : 'none';

          if (visible && firstVisible == null)
          {
            firstVisible = options[i].value;
          }
        }

        if (firstVisible != null)
        {
          modelEl.value = firstVisible;
        }

        if (keys && keys[engine])
        {
          apikeyEl.value = keys[engine];
        }
      }

      engineEl.addEventListener('change', engineChanged);
      engineChanged();

      document.getElementById('unescapeBtn').addEventListener('click', function()
      {
        var input = promptEl.value;
        input = input.replace(/\\u([0-9A-Fa-f]{4})/g, function(match, group) { return String.fromCharCode(parseInt(group, 16)); });
        promptEl.value = input.replace(/\\n/g, '\n');
      });

      function extractCode(input)
      {
        var result = input;

        if (result.indexOf('```mermaid') >= 0)
        {
          result = result.substring(result.indexOf('```mermaid') + 11);
        }
        else if (result.indexOf('```xml') >= 0)
        {
          result = result.substring(result.indexOf('```xml') + 7);
        }
        else
        {
          var start = result.indexOf('```');
          if (start === 0)
          {
            result = result.substring(3);
          }
          else if (start > 0)
          {
            result = result.substring(0, start + 3);
          }
        }

        result = result
          .replace(/^```mermaid\n/, '')
          .replace(/^```xml\n/, '')
          .replace(/\n```\n$/, '')
          .replace(/\n```$/, '')
          .replace(/<\?xml[^>]+\?>\s*/, '');

        console.log('Extracted code:', [input], 'result', [result]);

        return result;
      }

      var messageHandler = null;

      function preview(value)
      {
        var params = 'lightbox=1&dark=auto&border=10&edit=_blank';
        var prefix = 'https://www.draw.io/?';
        var data = value;

        var createObj =
        {
          type: value.indexOf('<') === 0 ? 'xml' : 'mermaid',
          data: data
        };

        var create = '#create=' + encodeURIComponent(JSON.stringify({type: 'message'}));
        var link = prefix + params + create;

        // Remove previous listener to avoid sending stale data
        if (messageHandler != null)
        {
          window.removeEventListener('message', messageHandler);
        }

        // Waits for ready message event and sends create message to iframe
        messageHandler = function(event)
        {
          if (JSON.parse(event.data).event === 'ready')
          {
            event.source.postMessage({action: 'create', data: createObj}, '*');
          }
        };

        window.addEventListener('message', messageHandler);

        previewEl.src = link;
        previewEl.style.display = 'block';
        placeholderEl.style.display = 'none';
        previewContainer.classList.remove('preview-loading');

        viewBtn.disabled = false;
        editBtn.disabled = false;
        generateBtn.disabled = false;

        viewBtn.onclick = function() { window.open(prefix + params + create); };
        editBtn.onclick = function() { window.open(prefix + create); };
      }

      function resetUI()
      {
        generateBtn.disabled = false;
        previewContainer.classList.remove('preview-loading');
        placeholderEl.style.display = 'flex';
      }

      function generate()
      {
        var engine = engineEl.value;
        var selectedModel = modelEl.value;
        var apikey = apikeyEl.value;
        var prompt = promptEl.value || 'a random diagram';

        // Handle direct Mermaid/XML input
        if (engine === 'mermaidjs' || engine === 'drawio')
        {
          preview(prompt);
          return;
        }

        if (!apikey)
        {
          showAlert('API key is required for ' + engine, 'error');
          return;
        }

        // Find the selected aiModel entry
        var aiModel = null;

        for (var i = 0; i < aiModels.length; i++)
        {
          if (aiModels[i].model === selectedModel)
          {
            aiModel = aiModels[i];
            break;
          }
        }

        if (aiModel == null || aiConfigs[aiModel.config] == null)
        {
          showAlert('Invalid model: ' + selectedModel, 'error');
          return;
        }

        var config = aiConfigs[aiModel.config];

        generateBtn.disabled = true;
        viewBtn.disabled = true;
        editBtn.disabled = true;
        previewEl.style.display = 'none';
        placeholderEl.style.display = 'none';
        previewContainer.classList.add('preview-loading');

        var aiprompt = aiPromptSelectEl.value.replace(/%prompt%/g, prompt);

        // Store the API key in aiGlobals for placeholder resolution
        aiGlobals[config.apiKey] = apikey;

        // Placeholder resolver, matching ChatWindow's resolver pattern
        var resolver = function(name)
        {
          var value = null;

          if (name === 'prompt')
          {
            value = aiprompt;
          }
          else if (name === 'model')
          {
            value = aiModel.model;
          }
          else if (name === 'apiKey')
          {
            name = config.apiKey;
          }
          else if (name === 'action')
          {
            name = 'create';
          }

          if (value == null)
          {
            value = replacePlaceholders(aiGlobals[name], resolver);
          }

          return value;
        };

        // Build request from config template
        var url = replacePlaceholders(config.endpoint, resolver);
        var params = populateTemplate(config.request, resolver);

        // Build request headers from config
        var headers = {'Content-Type': 'application/json'};

        for (var key in config.requestHeaders)
        {
          headers[key] = replacePlaceholders(config.requestHeaders[key], resolver);
        }

        console.log('AI request', 'url', url, 'params', params, 'aiModel', aiModel, 'config', config);

        var t0 = Date.now();
        infoEl.textContent = 'Engine: ' + engine + ' | Model: ' + aiModel.name + ' | Waiting...';

        var controller = new AbortController();
        var timeoutId = setTimeout(function() { controller.abort(); }, 60000);

        fetch(url,
        {
          method: 'POST',
          headers: headers,
          body: JSON.stringify(params),
          signal: controller.signal
        }).then(function(response)
        {
          if (response.ok)
          {
            return response.json();
          }

          // Parse error response body for detailed message, matching ChatWindow's pattern
          return response.json().then(function(resp)
          {
            var message = 'HTTP error! Status: ' + response.status;

            if (resp != null && resp.error != null && resp.error.message != null)
            {
              message = resp.error.message;
            }

            throw new Error(message);
          }, function()
          {
            throw new Error('HTTP error! Status: ' + response.status);
          });
        }).then(function(jsonResponse)
        {
          var dt = Date.now() - t0;
          infoEl.textContent = 'Engine: ' + engine + ' | Model: ' + aiModel.name + ' | Time: ' + dt + 'ms';

          // Extract text from response using config's JSONPath, matching ChatWindow's pattern
          var result = executeSimpleJsonPath(jsonResponse, config.responsePath);
          var text = ((result.length > 0) ? result[0] : '').trim();

          console.log('AI response', 'response', jsonResponse, 'text', [text]);

          preview(extractCode(text));
        }).catch(function(error)
        {
          console.error('Error:', error);
          showAlert('Error: ' + error.message, 'error');
          resetUI();
        }).finally(function()
        {
          clearTimeout(timeoutId);
        });
      }

      generateBtn.addEventListener('click', generate);

      promptEl.addEventListener('keypress', function(e)
      {
        if (e.key === 'Enter' && !e.shiftKey)
        {
          e.preventDefault();
          generate();
        }
      });

      DT.setupDropZone(
        promptEl,
        function(content, file)
        {
          if (file.type.indexOf('image/') === 0)
          {
            DT.readFileAsDataURL(file).then(function(dataUrl)
            {
              promptEl.value = dataUrl;
            });
          }
          else
          {
            promptEl.value = content;
          }
        }
      );

      promptEl.focus();

      if (urlParams.get('engine'))
      {
        engineEl.value = urlParams.get('engine');
        engineChanged();
      }

      if (urlParams.get('prompt'))
      {
        promptEl.value = decodeURIComponent(urlParams.get('prompt'));
        generate();
      }
    })();
  </script>
</body>
</html>
